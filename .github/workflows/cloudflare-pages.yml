name: cloudflare-pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'wasm/**'
      - '.github/workflows/cloudflare-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'frontend/.nvmrc'

      - name: Enable corepack
        run: corepack enable

      - name: Build wasm
        run: go build -ldflags="-s -w" -v -o frontend/static/calculator.wasm ./wasm
        env:
          GOOS: js
          GOARCH: wasm

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install
          pnpm run build
          ls -lah build

      - name: Validate Cloudflare credentials
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN secret."
            exit 1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID secret."
            exit 1
          fi

      - name: Resolve Cloudflare Pages project name
        id: cloudflare-pages-project
        shell: bash
        env:
          CF_PAGES_PROJECT_VAR: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          CF_PAGES_PROJECT_SECRET: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          project_name="${CF_PAGES_PROJECT_VAR:-$CF_PAGES_PROJECT_SECRET}"
          if [ -z "$project_name" ]; then
            project_name="${GITHUB_REPOSITORY#*/}"
            echo "::warning::CLOUDFLARE_PAGES_PROJECT_NAME not set. Falling back to repository name: $project_name"
          fi
          echo "project_name=$project_name" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm dlx wrangler@4 pages deploy build --project-name="${{ steps.cloudflare-pages-project.outputs.project_name }}"
